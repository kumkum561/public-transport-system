<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TransitGo</title>
    <link rel="stylesheet" href="css/js/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html"><i class="fas fa-bus-alt"></i> <span>TransitGo</span></a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card admin-card">
            <div class="auth-header">
                <i class="fas fa-user-shield"></i>
                <h2>Admin Login</h2>
                <p>Authorized personnel only</p>
            </div>

            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Admin username" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="adminPassword" placeholder="Admin password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('adminPassword', this)"></i>
                    </div>
                </div>

                <div id="errorMsg" class="error-msg"></div>

                <button type="submit" class="btn btn-danger btn-full">
                    <i class="fas fa-sign-in-alt"></i> Admin Login
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="login.html">← User Login</a></p>
            </div>
        </div>
    </div>

    <script src="css/js/auth.js"></script>
</body>
</html>
