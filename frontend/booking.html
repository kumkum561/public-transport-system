<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Ticket - TransitGo</title>
    <link rel="stylesheet" href="css/js/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html"><i class="fas fa-bus-alt"></i> <span>TransitGo</span></a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="search.html">Search</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="booking-container">
        <div class="booking-card">
            <h1><i class="fas fa-ticket-alt"></i> Book Your Ticket</h1>

            <div id="transportInfo" class="transport-info-card">
                <!-- Populated by JS -->
            </div>

            <div class="booking-form">
                <div class="form-group">
                    <label><i class="fas fa-users"></i> Number of Passengers</label>
                    <input type="number" id="passengers" min="1" max="10" value="1" onchange="updateTotal()">
                </div>

                <div class="total-section">
                    <h3>Total: ₹<span id="totalPrice">0.00</span></h3>
                </div>

                <div id="bookingMsg" class="success-msg"></div>
                <div id="bookingError" class="error-msg"></div>

                <button class="btn btn-primary btn-full" onclick="confirmBooking()">
                    <i class="fas fa-check-circle"></i> Confirm Booking
                </button>
            </div>
        </div>
    </div>

    <script src="css/js/booking.js"></script>
</body>
</html>
