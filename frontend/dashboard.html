<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TransitGo</title>
    <link rel="stylesheet" href="css/js/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html"><i class="fas fa-bus-alt"></i> <span>TransitGo</span></a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="search.html">Search</a>
            <a href="contact.html">Contact Us</a>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="#" class="notif-bell" onclick="toggleNotifications(event)">
                <i class="fas fa-bell"></i>
                <span id="notifBadge" class="notif-badge" style="display:none;">0</span>
            </a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <!-- Notifications Panel -->
    <div id="notifPanel" class="notif-panel" style="display:none;">
        <div class="notif-panel-header">
            <h3><i class="fas fa-bell"></i> Notifications</h3>
            <button onclick="markAllRead()" class="btn-link">Mark all read</button>
        </div>
        <div id="notifList" class="notif-list">
            <p class="no-data" style="padding:16px;">No notifications</p>
        </div>
    </div>
    <div id="notifOverlay" class="notif-overlay" style="display:none;" onclick="closeNotifications()"></div>

    <!-- QR Code Modal -->
    <div id="qrModal" class="modal" style="display:none;">
        <div class="qr-modal-content">
            <div class="qr-modal-header">
                <h3><i class="fas fa-qrcode"></i> Your Ticket QR Code</h3>
                <button class="rzp-close" onclick="closeQrModal()">&times;</button>
            </div>
            <div class="qr-modal-body">
                <p id="qrBookingId" class="qr-booking-id"></p>
                <img id="qrImage" src="" alt="QR Code" class="qr-image">
                <p class="qr-hint"><i class="fas fa-info-circle"></i> Show this QR code at the boarding point</p>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-tachometer-alt"></i> My Dashboard</h1>
            <p>Welcome back, <span id="userName">User</span>!</p>
        </div>

        <div class="dashboard-stats">
            <div class="stat-card">
                <i class="fas fa-ticket-alt"></i>
                <div>
                    <h3 id="totalBookings">0</h3>
                    <p>Total Bookings</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div>
                    <h3 id="activeBookings">0</h3>
                    <p>Active</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-ban"></i>
                <div>
                    <h3 id="cancelledBookings">0</h3>
                    <p>Cancelled</p>
                </div>
            </div>
        </div>

        <div class="bookings-section">
            <h2><i class="fas fa-history"></i> My Bookings</h2>
            <div id="bookingsList" class="bookings-list">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script src="css/js/dashboard.js"></script>
</body>
</html>
