<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TransitGo</title>
    <link rel="stylesheet" href="css/js/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html"><i class="fas fa-bus-alt"></i> <span>TransitGo</span></a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h2>Create Account</h2>
                <p>Register to start booking your rides</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone (10 digits)</label>
                    <input type="tel" id="phone" placeholder="Enter 10-digit phone number" required maxlength="10">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Create a strong password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
                    </div>
                    <div class="password-requirements">
                        <small id="req-length"><i class="fas fa-times"></i> At least 8 characters</small>
                        <small id="req-upper"><i class="fas fa-times"></i> One uppercase letter</small>
                        <small id="req-lower"><i class="fas fa-times"></i> One lowercase letter</small>
                        <small id="req-digit"><i class="fas fa-times"></i> One digit</small>
                        <small id="req-special"><i class="fas fa-times"></i> One special character</small>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>
                </div>

                <div id="errorMsg" class="error-msg"></div>
                <div id="successMsg" class="success-msg"></div>

                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="css/js/auth.js"></script>
    <script>
        // Real-time password validation feedback
        document.getElementById("password").addEventListener("input", function () {
            const pw = this.value;
            check("req-length", pw.length >= 8);
            check("req-upper", /[A-Z]/.test(pw));
            check("req-lower", /[a-z]/.test(pw));
            check("req-digit", /\d/.test(pw));
            check("req-special", /[!@#$%^&*(),.?":{}|<>]/.test(pw));
        });

        function check(id, valid) {
            const el = document.getElementById(id);
            if (valid) {
                el.innerHTML = el.innerHTML.replace("fa-times", "fa-check");
                el.classList.add("valid");
                el.classList.remove("invalid");
            } else {
                el.innerHTML = el.innerHTML.replace("fa-check", "fa-times");
                el.classList.remove("valid");
                el.classList.add("invalid");
            }
        }
    </script>
</body>
</html>
