<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Routes - TransitGo</title>
    <link rel="stylesheet" href="css/js/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html"><i class="fas fa-bus-alt"></i> <span>TransitGo</span></a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="search.html" class="active">Search</a>
            <a href="login.html" id="loginBtn">Login</a>
            <a href="dashboard.html" id="dashboardBtn" style="display:none;">Dashboard</a>
            <a href="#" id="logoutBtn" style="display:none;" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="search-container">
        <div class="search-header">
            <h1><i class="fas fa-search"></i> Search Routes</h1>
        </div>

        <div class="search-filters">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Source</label>
                    <input type="text" id="searchSource" placeholder="From where?">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-map-pin"></i> Destination</label>
                    <input type="text" id="searchDest" placeholder="To where?">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-bus"></i> Mode</label>
                    <select id="searchMode">
                        <option value="">All Modes</option>
                        <option value="Bus">Bus</option>
                        <option value="Train">Train</option>
                        <option value="Metro">Metro</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="searchRoutes()">
                    <i class="fas fa-search"></i> Search
                </button>
                <button class="btn btn-secondary" onclick="clearSearch()">
                    <i class="fas fa-times"></i> Clear
                </button>
            </div>
        </div>

        <div id="searchResults" class="transport-grid">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="css/js/search.js"></script>
</body>
</html>
